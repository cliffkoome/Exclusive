<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="stylesheet" href="styles/index.css">
  <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css">
  <script src="scripts/index.js" defer></script>
</head>
<body>
  <div class="header">
    <div class="msg-ln">
      <div class="msg-ln-div">
        <p style="display: inline-block; font-size: 14px;">
          Summer Sale For All Swim Suits And Free Express Delivery - OFF 50%!
          <a href="#" style="color: white; text-decoration: underline;">
            ShopNow
          </a>
        </p>
        <select class="language" name="language">
          <option value="en">English</option>
          <option value="german">German</option>
          <option value="spanish">Spanish</option>
        </select>
      </div>
    </div>
    <div class="nav-bar">
      <div class="nav-bar-div">
        <p style="font-weight: bold; font-size: 20px;">Exclusive</p>
        <div class="nav-bar-items-div">
          <a href="#" class="nav-bar-items">Home</a>
          <a href="#" class="nav-bar-items">Contact</a>
          <a href="#" class="nav-bar-items">About</a>
          <a href="#" class="nav-bar-items">Sign Up</a>
        </div>
        <div class="nav-bar-div-search-div">
          <input type="text" placeholder="What are you looking for?" class="nav-bar-div-search">
          <span>Liked</span>
          <span>Cart</span>
        </div>
      </div>
    </div>
  </div>
  <div class="hero-section">
    <div class="categories">
      <div class="categories-section">
        <a href="#">Women's Fashion</a>
        <a href="#">Men's Fashion</a>
        <a href="#">Electronics</a>
        <a href="#">Home & Lifestyle</a>
        <a href="#">Medicine</a>
        <a href="#">Sports & Outdoor</a>
        <a href="#">Baby's & Toys</a>
        <a href="#">Groceries & Pets</a>
        <a href="#">Health & Beauty</a>
      </div>
    </div>
    <div class="shop-preview">
      <div class="my-swiper-container">
        <div class="swiper">
          <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="images/product-2.jpg" class="image"></div>
            <div class="swiper-slide"><img src="images/product-3.jpg" class="image"></div>
            <div class="swiper-slide"><img src="images/product-4.jpg" class="image"></div>
            <div class="swiper-slide"><img src="images/product-5.jpg" class="image"></div>  
          </div>
          <div class="swiper-pagination"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
  <script src="scripts/swipper.js"></script>
</body>
</html>
